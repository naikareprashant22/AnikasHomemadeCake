<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cake Gallery | Anika’s Homemade Cake Studio</title>

<link rel="stylesheet" href="style.css">

<style>

.gallery-filter{
text-align:center;
margin:30px 0;
}

.gallery-filter button{
padding:10px 18px;
border:none;
background:#6b3e26;
color:white;
margin:5px;
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.gallery-filter button:hover{
background:#8c5a3c;
}

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
max-width:1200px;
margin:auto;
}

.gallery-item{
overflow:hidden;
border-radius:12px;
cursor:pointer;
}

.gallery-item img{
width:100%;
height:220px;
object-fit:cover;
transition:transform .4s ease;
}

.gallery-item:hover img{
transform:scale(1.1);
}

/* Lightbox */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.lightbox img{
max-width:90%;
max-height:80%;
border-radius:10px;
}

.lightbox span{
position:absolute;
top:30px;
right:40px;
font-size:40px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<nav>
<h2>Anika’s Oven Studio</h2>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="gallery.html">Gallery</a></li>
<li><a href="reviews.html">Reviews</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</nav>

<h1 style="text-align:center;margin-top:30px;">Our Cake Gallery</h1>

<!-- FILTER BUTTONS -->

<div class="gallery-filter">

<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('birthday')">Birthday</button>
<button onclick="filterSelection('theme')">Theme Cakes</button>
<button onclick="filterSelection('kids')">Kids Cakes</button>
<button onclick="filterSelection('anniversary')">Anniversary</button>

</div>


<!-- GALLERY GRID -->

<div class="gallery-grid">

<div class="gallery-item birthday">
<img src="images/birthday1.jpg" onclick="openLightbox(this.src)">
</div>

<div class="gallery-item birthday">
<img src="images/birthday2.jpg" onclick="openLightbox(this.src)">
</div>

<div class="gallery-item theme">
<img src="images/theme1.jpg" onclick="openLightbox(this.src)">
</div>

<div class="gallery-item kids">
<img src="images/kids1.jpg" onclick="openLightbox(this.src)">
</div>

<div class="gallery-item anniversary">
<img src="images/anniversary1.jpg" onclick="openLightbox(this.src)">
</div>

<div class="gallery-item theme">
<img src="images/theme2.jpg" onclick="openLightbox(this.src)">
</div>

</div>


<!-- LIGHTBOX -->

<div id="lightbox" class="lightbox">
<span onclick="closeLightbox()">×</span>
<img id="lightbox-img">
</div>


<script>

/* FILTER */

function filterSelection(category){

let items = document.getElementsByClassName("gallery-item");

for(let i=0;i<items.length;i++){

if(category === "all"){
items[i].style.display="block";
}
else{
if(items[i].classList.contains(category)){
items[i].style.display="block";
}
else{
items[i].style.display="none";
}
}

}

}


/* LIGHTBOX */

function openLightbox(src){

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightbox-img").src=src;

}

function closeLightbox(){

document.getElementById("lightbox").style.display="none";

}

</script>


<footer>
<p>© 2026 Anika’s Oven Studio</p>
</footer>

</body>
</html>

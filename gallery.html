<!DOCTYPE html> 
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Gallery | Anika’s Homemade Cake Studio</title>
      <meta name="description" content="Explore our birthday, anniversary, theme and fondant cake designs in Ravet, Pune.">
      <link rel="stylesheet" href="style.css">
      <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
      <style> /* CATEGORY TABS */ .gallery-tabs{ display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:30px; } .tab-btn{ padding:10px 20px; border:none; border-radius:25px; background:#6b3e26; color:white; font-size:14px; cursor:pointer; transition:0.3s; } .tab-btn:hover{ background:#8c5a3c; } .tab-btn.active{ background:#d2691e; } /* GALLERY GRID (Pinterest Style) */ .gallery-grid{ column-count:3; column-gap:15px; margin-top:20px; } @media(max-width:900px){ .gallery-grid{ column-count:2; } } @media(max-width:500px){ .gallery-grid{ column-count:1; } } /* GALLERY ITEMS */ .gallery-grid img, .gallery-grid video{ width:100%; margin-bottom:15px; border-radius:12px; cursor:pointer; display:block; transition:transform .35s ease, box-shadow .3s ease; animation:fadeIn .8s ease; } .gallery-grid img:hover, .gallery-grid video:hover{ transform:scale(1.05); box-shadow:0 10px 25px rgba(0,0,0,0.25); } /* FADE ANIMATION */ @keyframes fadeIn{ from{ opacity:0; transform:translateY(15px); } to{ opacity:1; transform:translateY(0); } } /* LIGHTBOX */ .lightbox{ display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:1000; } .lightbox img{ max-width:90%; max-height:80%; border-radius:10px; } .lightbox span{ position:absolute; top:25px; right:35px; font-size:40px; color:white; cursor:pointer; } /* INSTAGRAM FLOAT BUTTON */ .instagram-float{ position:fixed; bottom:90px; right:20px; background:#E1306C; color:white; font-size:22px; padding:14px 16px; border-radius:50%; box-shadow:0 6px 20px rgba(0,0,0,0.3); z-index:999; text-decoration:none; } </style>
   </head>
   <body>
      <nav class="main-nav">
         <div class="nav-container">
            <div class="logo"> Anika’s Homemade Cake Studio </div>
            <ul class="nav-menu">
               <li><a href="index.html">Home</a></li>
               <li><a href="about.html">About</a></li>
               <li><a href="gallery.html">Gallery</a></li>
               <li><a href="reviews.html">Reviews</a></li>
               <li><a href="contact.html">Contact</a></li>
            </ul>
         </div>
      </nav>
      <section class="section">
         <h2>Our Cake Gallery</h2>
         <!-- CATEGORY FILTER --> 
         <div class="gallery-tabs">
            <button class="tab-btn active" onclick="filterSelection('all',this)">All</button>
            <button class="tab-btn" onclick="filterSelection('birthday',this)">Birthday</button>
            <button class="tab-btn" onclick="filterSelection('anniversary',this)">Anniversary</button>
            <button class="tab-btn" onclick="filterSelection('theme',this)">Theme</button>
         </div>
         <!-- BIRTHDAY --> 
         <section class="gallery-section">
            <h2>Birthday Cakes</h2>
            <div class="gallery-grid">
               <img src="images/10.jpeg" alt="Birthday Cake" loading="lazy" class="gallery-item birthday" onclick="openLightbox(this.src)"> <img src="images/5.jpeg" alt="Birthday Cake" loading="lazy" class="gallery-item birthday" onclick="openLightbox(this.src)"> 
               <video controls class="gallery-item birthday">
                  <source src="images/Video1.mp4" type="video/mp4">
               </video>
            </div>
         </section>
         <!-- ANNIVERSARY --> 
         <section class="gallery-section">
            <h2>Anniversary Cakes</h2>
            <div class="gallery-grid"> <img src="images/4.jpeg" alt="Anniversary Cake" loading="lazy" class="gallery-item anniversary" onclick="openLightbox(this.src)"> <img src="images/4.jpeg" alt="Anniversary Cake" loading="lazy" class="gallery-item anniversary" onclick="openLightbox(this.src)"> </div>
         </section>
         <!-- THEME --> 
         <section class="gallery-section">
            <h2>Theme Cakes</h2>
            <div class="gallery-grid">
               <img src="images/1.jpeg" alt="Theme Cake" loading="lazy" class="gallery-item theme" onclick="openLightbox(this.src)"> 
               <video controls class="gallery-item theme">
                  <source src="images/Video1.mp4" type="video/mp4">
               </video>
            </div>
         </section>
      </section>
      <!-- LIGHTBOX --> 
      <div id="lightbox" class="lightbox"> <span onclick="closeLightbox()">×</span> <img id="lightbox-img"> </div>
      <footer>
         <p>📍 Vision Aristo, Mukai Chowk, Ravet, Pune, Maharashtra - 412101</p>
         <p>© 2026 Anika’s Homemade Cake Studio</p>
      </footer>
      <a class="whatsapp-float" href="https://wa.me/919503025610?text=Good%20day%2C%0A%0AI%20would%20like%20to%20place%20an%20order%20for%20a%20cake.%20Kindly%20provide%20details%20regarding%20the%20available%20flavors%2C%20sizes%2C%20pricing%2C%20and%20delivery%20or%20pickup%20options.%0A%0AThank%20you%20in%20advance%20for%20your%20assistance." target="_blank">Order Now</a>
      <a class="instagram-float" href="https://instagram.com/YOUR_INSTAGRAM_ID" target="_blank">📸</a>
      <script> /* CATEGORY FILTER */ function filterSelection(category,btn){ let items=document.getElementsByClassName("gallery-item"); for(let i=0;i<items.length;i++){ if(category==="all"){ items[i].style.display="block"; } else{ if(items[i].classList.contains(category)){ items[i].style.display="block"; } else{ items[i].style.display="none"; } } } /* ACTIVE TAB */ let tabs=document.querySelectorAll(".tab-btn"); tabs.forEach(tab=>tab.classList.remove("active")); btn.classList.add("active"); } /* LIGHTBOX */ function openLightbox(src){ document.getElementById("lightbox").style.display="flex"; document.getElementById("lightbox-img").src=src; } function closeLightbox(){ document.getElementById("lightbox").style.display="none"; } </script> 
   </body>
</html>
